<!DOCTYPE html>
<html lang="da" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktieguld Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="radar.css">
</head>
<body>

<div class="hero">
  <h1>🪙 Aktieguld <span>Centralen</span></h1>
  <div class="sub" id="tagline"></div>
  <div class="meta">
    <span id="mWeek"></span> · <span id="mDate"></span>
  </div>
  <div class="meta" id="mUpd"></div>
</div>

<div class="container">

  <!-- Vault -->
  <div class="vault" id="vaultGrid"></div>

  <!-- Phases -->
  <div class="phases" id="phases"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="filters">
      <button data-filter data-filterval="all" aria-pressed="true">Alle</button>
      <button data-filter data-filterval="buy" aria-pressed="false">🪙 Guldkorn</button>
      <button data-filter data-filterval="wait" aria-pressed="false">⏳ Afvent</button>
      <button data-filter data-filterval="avoid" aria-pressed="false">✋ Fravælg</button>
    </div>
    <button class="theme-btn" id="themeToggle">🌙 Mørk</button>
  </div>

  <div class="count-note" id="countNote"></div>
  <div class="pending-wrap" id="pendingWrap"></div>

  <!-- Table -->
  <div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:24px"></th>
        <th class="sortable" data-sort="name">Navn<span class="arr"></span></th>
        <th class="sortable" data-sort="name" style="font-weight:400">Kurs</th>
        <th class="sortable hide-sm" data-sort="week">Uge<span class="arr"></span></th>
        <th class="sortable hide-sm" data-sort="year">År<span class="arr"></span></th>
        <th class="sortable hide-md" data-sort="pe">P/E<span class="arr"></span></th>
        <th class="sortable" data-sort="score">Score<span class="arr"></span></th>
        <th class="sortable" data-sort="ret">Afkast<span class="arr"></span></th>
        <th style="width:90px">Vurdering</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>

  <!-- Add stock -->
  <div class="add-stock">
    <form class="add-form" id="addForm" autocomplete="off">
      <input type="text" id="tickerInput" placeholder="Ticker f.eks. MAERSK-B.CO" spellcheck="false">
      <button type="submit">Tilføj</button>
    </form>
    <p style="margin-top:6px;font-size:.78rem;color:var(--text-faint)">Tilføjede tickers gemmes lokalt og hentes ved næste søndagskørsel</p>
  </div>

</div>

<div class="footer">
  <p>Baseret på principper fra bogen "Aktieguld" • Data fra Yahoo Finance, Ritzau Finans &amp; Børsen</p>
  <p>Sidst opdateret: — • Kører hver søndag</p>
</div>

<script src="radar-data.js"></script>
<script src="radar-app.js"></script>
</body>
</html>
